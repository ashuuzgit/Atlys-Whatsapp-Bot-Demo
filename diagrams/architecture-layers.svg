<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="760" fill="#ffffff"/>
  <text x="460" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">Atlys Visa Assistant - Architecture Layers</text>
  <text x="460" y="66" text-anchor="middle" font-size="14" fill="#6b7280">The client at the top is swappable. Everything below the protocol line is the reusable engine.</text>

  <!-- Layer 1: Client -->
  <rect x="70" y="90" width="700" height="92" rx="10" fill="#e8f1fe" stroke="#3b82f6" stroke-width="2"/>
  <text x="86" y="116" font-size="13" font-weight="700" fill="#1d4ed8">LAYER 1  -  CLIENT / CHANNEL  (SWAPPABLE)</text>
  <rect x="90" y="128" width="200" height="40" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="190" y="153" text-anchor="middle" font-size="13" fill="#1e3a8a">Claude Desktop (today)</text>
  <rect x="305" y="128" width="220" height="40" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="415" y="153" text-anchor="middle" font-size="13" fill="#1e3a8a">WhatsApp Cloud API (next)</text>
  <rect x="540" y="128" width="210" height="40" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="645" y="153" text-anchor="middle" font-size="13" fill="#1e3a8a">Web demo (localhost)</text>

  <!-- Layer 2: LLM -->
  <rect x="70" y="200" width="700" height="86" rx="10" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="86" y="226" font-size="13" font-weight="700" fill="#6d28d9">LAYER 2  -  LLM  (THE MOUTH)</text>
  <text x="90" y="252" font-size="13" fill="#4c1d95">Reads messy user text  |  Extracts structured slots  |  Words the final reply and pitch</text>
  <text x="90" y="273" font-size="12" fill="#7c3aed" font-style="italic">Never decides visa rules or offers. Language only.</text>

  <!-- Layer 3: MCP protocol -->
  <rect x="70" y="304" width="700" height="60" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="86" y="330" font-size="13" font-weight="700" fill="#334155">LAYER 3  -  MCP PROTOCOL  (THE CONNECTOR)</text>
  <text x="90" y="352" font-size="13" fill="#475569">stdio transport today  |  tool calls in, JSON data out</text>

  <!-- dividing line: AI above / Code below -->
  <line x1="70" y1="378" x2="770" y2="378" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6 5"/>

  <!-- Layer 4: MCP Server -->
  <rect x="70" y="386" width="700" height="86" rx="10" fill="#e6fffb" stroke="#14b8a6" stroke-width="2"/>
  <text x="86" y="412" font-size="13" font-weight="700" fill="#0f766e">LAYER 4  -  MCP SERVER  (THE BRAIN - plain code)</text>
  <text x="90" y="438" font-size="12.5" fill="#115e59">list_dubai_visa_options  |  get_required_documents  |  check_eligibility</text>
  <text x="90" y="459" font-size="12.5" fill="#115e59">parse_message  |  get_upsell_offer</text>

  <!-- Layer 5: Engine -->
  <rect x="70" y="490" width="700" height="86" rx="10" fill="#e7f8ec" stroke="#22c55e" stroke-width="2"/>
  <text x="86" y="516" font-size="13" font-weight="700" fill="#15803d">LAYER 5  -  ENGINE  (DETERMINISTIC LOGIC)</text>
  <text x="90" y="542" font-size="12.5" fill="#166534">Eligibility engine - strict lookup  |  Slot extractor - fallback</text>
  <text x="90" y="563" font-size="12.5" fill="#166534">Upsell engine - GUARDED, GATHER, GATED, DEDUPED, RANKED, LOGGED</text>

  <!-- Layer 6: Data -->
  <rect x="70" y="594" width="700" height="86" rx="10" fill="#fff7e6" stroke="#f59e0b" stroke-width="2"/>
  <text x="86" y="620" font-size="13" font-weight="700" fill="#b45309">LAYER 6  -  DATA</text>
  <text x="90" y="646" font-size="12.5" fill="#92400e">Visa catalogue - prices, docs, processing  |  Offer table - triggers, conversion, margin</text>
  <text x="90" y="667" font-size="12.5" fill="#92400e">Offer log - offers_log.jsonl  (feedback loop that re-orders ranking)</text>

  <!-- right-side brackets -->
  <text x="800" y="250" font-size="13" font-weight="700" fill="#7c3aed" transform="rotate(90 800 250)">AI / MOUTH</text>
  <line x1="780" y1="200" x2="780" y2="286" stroke="#8b5cf6" stroke-width="3"/>
  <text x="800" y="560" font-size="13" font-weight="700" fill="#0f766e" transform="rotate(90 800 560)">CODE / BRAIN</text>
  <line x1="780" y1="386" x2="780" y2="680" stroke="#14b8a6" stroke-width="3"/>

  <!-- down arrows between layers -->
  <g stroke="#9ca3af" stroke-width="2" fill="none">
    <path d="M420 182 L420 198" marker-end="url(#a)"/>
    <path d="M420 286 L420 302" marker-end="url(#a)"/>
    <path d="M420 364 L420 384" marker-end="url(#a)"/>
    <path d="M420 472 L420 488" marker-end="url(#a)"/>
    <path d="M420 576 L420 592" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0 0 L7 5 L0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
