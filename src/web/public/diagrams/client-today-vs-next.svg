<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">Only the top box changes. The brain and data stay the same.</text>
  <text x="490" y="66" text-anchor="middle" font-size="14" fill="#6b7280">Today we drive the engine with Claude Desktop to prove it works. Next we swap the client for WhatsApp.</text>

  <!-- TODAY panel -->
  <rect x="40" y="90" width="430" height="440" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="255" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">TODAY - proving it works</text>

  <rect x="120" y="140" width="270" height="52" rx="9" fill="#e8f1fe" stroke="#3b82f6" stroke-width="2"/>
  <text x="255" y="171" text-anchor="middle" font-size="14" fill="#1d4ed8">You, typing in Claude Desktop</text>

  <rect x="120" y="212" width="270" height="52" rx="9" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="255" y="243" text-anchor="middle" font-size="14" fill="#6d28d9">Claude  (LLM - the Mouth)</text>

  <rect x="120" y="284" width="270" height="52" rx="9" fill="#e6fffb" stroke="#14b8a6" stroke-width="2"/>
  <text x="255" y="309" text-anchor="middle" font-size="13.5" fill="#0f766e">atlys-visa MCP server</text>
  <text x="255" y="327" text-anchor="middle" font-size="11" fill="#0f766e">via MCP over stdio</text>

  <rect x="120" y="356" width="270" height="52" rx="9" fill="#e7f8ec" stroke="#22c55e" stroke-width="2"/>
  <text x="255" y="381" text-anchor="middle" font-size="14" fill="#15803d">Engine + Data</text>
  <text x="255" y="399" text-anchor="middle" font-size="11" fill="#15803d">eligibility, upsell, visas, offers</text>

  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M255 192 L255 210" marker-end="url(#b)"/>
    <path d="M255 264 L255 282" marker-end="url(#b)"/>
    <path d="M255 336 L255 354" marker-end="url(#b)"/>
  </g>
  <path d="M405 382 C 450 382 450 166 405 166" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#b)"/>
  <text x="462" y="278" font-size="11" fill="#94a3b8" transform="rotate(90 462 278)">reply flows back</text>

  <!-- NEXT panel -->
  <rect x="510" y="90" width="430" height="440" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="725" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">NEXT - production</text>

  <rect x="590" y="140" width="270" height="46" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="725" y="168" text-anchor="middle" font-size="14" fill="#15803d">Real user on WhatsApp</text>

  <rect x="590" y="200" width="270" height="46" rx="9" fill="#e8f1fe" stroke="#3b82f6" stroke-width="2"/>
  <text x="725" y="228" text-anchor="middle" font-size="14" fill="#1d4ed8">WhatsApp Cloud API  +  webhook</text>

  <rect x="590" y="260" width="270" height="46" rx="9" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="725" y="288" text-anchor="middle" font-size="14" fill="#6d28d9">LLM  (the Mouth)</text>

  <rect x="590" y="320" width="270" height="52" rx="9" fill="#e6fffb" stroke="#14b8a6" stroke-width="3" stroke-dasharray="7 4"/>
  <text x="725" y="344" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f766e">SAME atlys-visa engine</text>
  <text x="725" y="362" text-anchor="middle" font-size="11" fill="#0f766e">nothing rebuilt</text>

  <rect x="590" y="386" width="270" height="46" rx="9" fill="#e7f8ec" stroke="#22c55e" stroke-width="2"/>
  <text x="725" y="414" text-anchor="middle" font-size="14" fill="#15803d">Engine + Data</text>

  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M725 186 L725 198" marker-end="url(#b)"/>
    <path d="M725 246 L725 258" marker-end="url(#b)"/>
    <path d="M725 306 L725 318" marker-end="url(#b)"/>
    <path d="M725 372 L725 384" marker-end="url(#b)"/>
  </g>

  <!-- swap arrow between panels -->
  <text x="490" y="300" text-anchor="middle" font-size="30" fill="#f59e0b" font-weight="700">-&gt;</text>
  <text x="490" y="325" text-anchor="middle" font-size="11" fill="#b45309">swap client</text>

  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0 0 L7 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
